# Bank 2 (HOMNBEB1) — zelfstandig opstart-bestand voor één bank.
# Gebruik vanuit deze folder:  docker compose up --build
#
# Voor de root-versie die beide banken samen runt: zie ../docker-compose.yml

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-pingfin_dev_password}
    ports:
      - "3307:3306"      # 3307 host-side om niet te botsen met Bank 1
    volumes:
      - bank2_db:/var/lib/mysql
      - ../pingfin_database.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  bank2:
    build:
      context: .
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      PORT: 8090
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bank2_db:
