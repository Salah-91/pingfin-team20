# Root compose: runt beide banken + 1 gedeelde MySQL.
# Voor losse opstart per bank: zie ./Bank 1/docker-compose.yml of ./Bank 2/docker-compose.yml
#
# Gebruik:  docker compose up --build

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-pingfin_dev_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./pingfin_database.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  bank1:
    build:
      context: ./Bank 1
    ports:
      - "8089:8089"
    env_file: ./Bank 1/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      PORT: 8089
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  bank2:
    build:
      context: ./Bank 2
    ports:
      - "8090:8090"
    env_file: ./Bank 2/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      PORT: 8090
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
