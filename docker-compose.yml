version: '3.8'

services:

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: pingfin_team20
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  bank1:
    build: ./api
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  bank2:
    build: ./bank2
    ports:
      - "3001:3001"
    env_file:
      - ./bank2/.env
    environment:
      DB2_HOST: db
      DB2_PORT: 3306
      PORT2: 3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  gui:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./gui:/usr/share/nginx/html:ro
    depends_on:
      - bank1
      - bank2
    restart: unless-stopped

volumes:
  db_data:
