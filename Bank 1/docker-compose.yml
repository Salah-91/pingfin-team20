# Bank 1 (CEKVBE88) — zelfstandig opstart-bestand voor één bank.
# Gebruik vanuit deze folder:  docker compose up --build
#
# Voor de root-versie die beide banken samen runt: zie ../docker-compose.yml

services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-pingfin_dev_password}
    ports:
      - "3306:3306"
    volumes:
      - bank1_db:/var/lib/mysql
      - ../pingfin_database.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  bank1:
    build:
      context: .
    ports:
      - "8089:8089"
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      PORT: 8089
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  bank1_db:
