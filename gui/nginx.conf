server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Statische GUI
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy naar Bank1 (default)
  location /bank1/api/ {
    proxy_pass http://bank1:3000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # Reverse proxy naar Bank2
  location /bank2/api/ {
    proxy_pass http://bank2:3001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
}
